name: Poollane
options:
  bundleIdPrefix: com.shimondeitel.swimdues
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Poollane:
    type: application
    platform: iOS
    sources:
      - path: Poollane
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.swimdues
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Poollane/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  PoollaneTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PoollaneTests
      - path: Poollane.storekit
    dependencies:
      - target: Poollane
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.swimdues.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  PoollaneUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PoollaneUITests
    dependencies:
      - target: Poollane
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.swimdues.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Poollane:
    build:
      targets:
        Poollane: all
        PoollaneTests: [test]
        PoollaneUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Poollane.storekit
    test:
      config: Debug
      storeKitConfiguration: Poollane.storekit
      targets:
        - PoollaneTests
        - PoollaneUITests
    archive:
      config: Release
